name: Build minimal geo files

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install tools
        run: |
          go install github.com/urlesistiana/v2dat@latest

          # sing-box
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
          echo "sing-box version: $SING_BOX_VERSION"
          curl -L -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          mv "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" /usr/local/bin/sing-box
          chmod +x /usr/local/bin/sing-box
          sing-box version

          # v2ray-core для сборки минимальных .dat
          V2RAY_VERSION=$(curl -s https://api.github.com/repos/v2fly/v2ray-core/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "v2ray version: $V2RAY_VERSION"
          curl -L -o v2ray.zip "https://github.com/v2fly/v2ray-core/releases/download/${V2RAY_VERSION}/v2ray-linux-64.zip"
          unzip -o v2ray.zip v2ray geosite.dat geoip.dat -d /tmp/v2ray/
          chmod +x /tmp/v2ray/v2ray
          /tmp/v2ray/v2ray version

          # domain-list-community компилятор
          go install github.com/v2fly/domain-list-community/cmd/v2ray-domain-list-community-compiler@latest

      - name: Download source files
        run: |
          curl -L -o geosite-full.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat
          curl -L -o geoip-full.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat

      - name: Extract categories
        run: |
          mkdir -p extracted/geosite extracted/geoip

          v2dat unpack geosite -o ./extracted/geosite \
            -f category-ru \
            -f category-gov-ru \
            -f vk \
            -f yandex \
            -f mailru \
            -f steam \
            -f epicgames \
            -f category-ads-all \
            geosite-full.dat

          v2dat unpack geoip -o ./extracted/geoip \
            -f ru \
            -f private \
            geoip-full.dat

          echo "=== Извлечённые файлы ==="
          ls -la extracted/geosite/
          ls -la extracted/geoip/

      - name: Build minimal geosite.dat via v2ray-core
        run: |
          mkdir -p output
          mkdir -p /tmp/domain-list-community/data

          # Конвертируем .txt файлы в формат domain-list-community
          for f in ./extracted/geosite/*.txt; do
            name=$(basename "$f" .txt | sed 's/geosite-full_//')
            echo "Подготавливаем geosite: $name"
            out_file="/tmp/domain-list-community/data/${name}"
            > "$out_file"
            while IFS= read -r line; do
              line=$(echo "$line" | tr -d '[:space:]')
              [[ -z "$line" || "$line" == \#* ]] && continue
              # Убираем leading dot если есть
              line="${line#.}"
              echo "full:${line}" >> "$out_file"
            done < "$f"
          done

          echo "=== Файлы domain-list ==="
          ls -la /tmp/domain-list-community/data/

          # Компилируем в geosite.dat
          cd /tmp/domain-list-community
          v2ray-domain-list-community-compiler \
            --datapath ./data \
            --outputpath "$(pwd)/../../$(pwd)/output/geosite.dat" \
            --exportlists $(ls data/ | tr '\n' ',' | sed 's/,$//')

          ls -la output/geosite.dat || echo "Файл не создан"

      - name: Build minimal geoip.dat via v2ray-core
        run: |
          # Используем v2dat для конвертации извлечённых IP в новый .dat
          # v2ray geoip формат собирается через go скрипт
          python3 << 'EOF'
          import os
          import ipaddress
          import struct

          def encode_varint(n):
              result = b''
              while True:
                  bits = n & 0x7f
                  n >>= 7
                  if n:
                      result += bytes([bits | 0x80])
                  else:
                      result += bytes([bits])
                      break
              return result

          def encode_len_field(field_number, data):
              tag = encode_varint((field_number << 3) | 2)
              return tag + encode_varint(len(data)) + data

          def encode_varint_field(field_number, value):
              tag = encode_varint((field_number << 3) | 0)
              return tag + encode_varint(value)

          def ip_to_cidr_proto(cidr_str):
              net = ipaddress.ip_network(cidr_str, strict=False)
              ip_bytes = net.network_address.packed
              prefix = net.prefixlen
              msg = b''
              msg += encode_len_field(1, ip_bytes)   # ip
              msg += encode_varint_field(2, prefix)   # prefix
              return msg

          def build_geoip_dat(src_dir, out_path):
              result = b''
              for fname in sorted(os.listdir(src_dir)):
                  if not fname.endswith('.txt'):
                      continue
                  tag = fname.replace('geoip-full_', '').replace('.txt', '').upper()
                  lines = open(f'{src_dir}/{fname}').read().splitlines()
                  cidrs = [l.strip() for l in lines if l.strip() and not l.startswith('#')]

                  entry = b''
                  entry += encode_len_field(1, tag.encode())  # country_code
                  for cidr in cidrs:
                      try:
                          cidr_proto = ip_to_cidr_proto(cidr)
                          entry += encode_len_field(2, cidr_proto)
                      except Exception as e:
                          print(f"  skip {cidr}: {e}")

                  result += encode_len_field(1, entry)
                  print(f"  geoip: {tag}, cidrs: {len(cidrs)}")

              open(out_path, 'wb').write(result)
              print(f"geoip.dat: {os.path.getsize(out_path)/1024:.1f} KB")

          build_geoip_dat('./extracted/geoip', './output/geoip.dat')
          EOF

      - name: Convert to .srs (Sing-box) and .mrs (Mihomo)
        run: |
          for f in ./extracted/geosite/*.txt; do
            name=$(basename "$f" .txt | sed 's/geosite-full_//')
            echo "geosite: $name"
            python3 -c "
          import json
          domains = open('$f').read().splitlines()
          rules = {
            'version': 1,
            'rules': [{
              'domain_suffix': [d.lstrip('.') for d in domains if d and not d.startswith('#')]
            }]
          }
          json.dump(rules, open('/tmp/${name}-geosite.json', 'w'))
          "
            sing-box rule-set compile \
              --output "./output/geosite-${name}.srs" \
              "/tmp/${name}-geosite.json"
          done

          for f in ./extracted/geoip/*.txt; do
            name=$(basename "$f" .txt | sed 's/geoip-full_//')
            echo "geoip: $name"
            python3 -c "
          import json
          cidrs = open('$f').read().splitlines()
          rules = {
            'version': 1,
            'rules': [{
              'ip_cidr': [c for c in cidrs if c and not c.startswith('#')]
            }]
          }
          json.dump(rules, open('/tmp/${name}-geoip.json', 'w'))
          "
            sing-box rule-set compile \
              --output "./output/geoip-${name}.srs" \
              "/tmp/${name}-geoip.json"
          done

          # .mrs = .srs для Mihomo
          for f in ./output/*.srs; do
            cp "$f" "${f%.srs}.mrs"
          done

      - name: Show sizes
        run: |
          echo "=== Все файлы ==="
          du -sh ./output/*

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: ./output/*
          body: |
            Auto-updated minimal geo files — ${{ github.run_id }}

            **geosite категории:** category-ru, category-gov-ru, vk, yandex, mailru, steam, epicgames, category-ads-all
            **geoip категории:** ru, private

            | Файл | Клиент |
            |------|--------|
            | `geosite.dat` / `geoip.dat` | Xray, V2ray, Happ |
            | `geosite-*.mrs` / `geoip-*.mrs` | Mihomo, Koala Clash |
            | `geosite-*.srs` / `geoip-*.srs` | Sing-box |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
